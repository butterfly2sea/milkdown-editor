name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: windows-latest
            target: aarch64-pc-windows-msvc
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build Tauri (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          npm run tauri build -- --target ${{ matrix.target }}

          # Patch desktop file in deb with correct MIME types and %F
          DEB_PATH=$(find src-tauri/target -name '*.deb' -print -quit)
          if [ -n "$DEB_PATH" ]; then
            TMPDIR=$(mktemp -d)
            dpkg-deb -R "$DEB_PATH" "$TMPDIR"
            cp src-tauri/desktop-template.desktop "$TMPDIR/usr/share/applications/Milkdown Editor.desktop"
            # Remove the extra desktop-template.desktop from root if present
            rm -f "$TMPDIR/desktop-template.desktop"
            dpkg-deb -b "$TMPDIR" "$DEB_PATH"
            rm -rf "$TMPDIR"
          fi

          # Patch desktop file in AppImage
          APPIMAGE_DIR=$(find src-tauri/target -name '*.AppDir' -type d -print -quit 2>/dev/null)
          if [ -n "$APPIMAGE_DIR" ] && [ -d "$APPIMAGE_DIR" ]; then
            find "$APPIMAGE_DIR" -name '*.desktop' -exec cp src-tauri/desktop-template.desktop {} \;
          fi

      - name: Build Tauri (non-Linux)
        if: matrix.platform != 'ubuntu-22.04'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: Milkdown Editor v__VERSION__
          releaseBody: |
            Download the installer for your platform.

            ## Downloads
            - **Windows**: `.msi` or `.exe` installer
            - **macOS**: `.dmg` disk image
            - **Linux**: `.deb` package or `.AppImage`

            ## macOS Note
            The macOS build is not notarized. If macOS shows "damaged" or "unidentified developer" warning, use one of these methods:
            1. Right-click the app → Open → Confirm
            2. Run in Terminal: `xattr -cr /Applications/Milkdown\ Editor.app`
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Upload Linux artifacts to release
        if: matrix.platform == 'ubuntu-22.04'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
